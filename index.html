<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lector QR – Asistencia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: system-ui, -apple-system;
  text-align: center;
}

h2 { margin: 10px 0 4px; }
p { margin: 0 0 10px; opacity: .8; }

#reader {
  width: 100vw;
  height: 70vh;
  overflow: hidden;
}

video {
  width: 100%;
  height: auto;
}

.confirmacion {
  font-size: 1.2rem;
  margin-top: 8px;
  color: #00ff88;
}

.confirmacion.error {
  color: #ff5555;
}

#ultimoUsuario {
  margin-top: 6px;
  font-size: 1rem;
  font-weight: 500;
}

.debug {
  margin-top: 10px;
  font-size: 0.8rem;
  opacity: .8;
  word-break: break-all;
}
</style>
</head>
<body>

<h2>📷 Registro de Asistencia</h2>
<p>Escanea el QR del gafete</p>

<div id="reader"></div>

<div id="confirmacion" class="confirmacion" style="display:none;"></div>
<div id="ultimoUsuario"></div>

<div class="debug">
  <div><strong>QR leído:</strong></div>
  <div id="qrLeido"></div>

  <div style="margin-top:6px;"><strong>ID usado para buscar:</strong></div>
  <div id="qrNormalizado"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- jsQR -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

<script>

/* 🔥 TU PROYECTO REAL */
firebase.initializeApp({
  apiKey: "AIzaSyDYGw0z382RHrr7y9PE10WZi5SHI4ba1Oc",
  authDomain: "asistencia-9755f.firebaseapp.com",
  projectId: "asistencia-9755f",
  storageBucket: "asistencia-9755f.firebasestorage.app",
  messagingSenderId: "1059163779930",
  appId: "1:1059163779930:web:55cd997ed75321b529f963"
});

const db = firebase.firestore();

const readerEl = document.getElementById("reader");
const confirmacion = document.getElementById("confirmacion");
const ultimoUsuarioEl = document.getElementById("ultimoUsuario");
const qrLeidoEl = document.getElementById("qrLeido");
const qrNormalizadoEl = document.getElementById("qrNormalizado");

let video, canvas, ctx;
let scanning = false;
let bloqueado = false;

/* Confirmación visual */
function mostrarConfirmacion(msg, tipo = "exito") {
  confirmacion.textContent = msg;
  confirmacion.className = tipo === "error"
    ? "confirmacion error"
    : "confirmacion";

  confirmacion.style.display = "block";
  setTimeout(() => confirmacion.style.display = "none", 1500);
}

/* Procesar QR */
async function procesarQR(qrText) {

  if (bloqueado) return;
  bloqueado = true;

  const qrOriginal = qrText.trim();
  const docId = qrOriginal.normalize("NFC");

  // 🔎 Mostrar debug en pantalla
  qrLeidoEl.textContent = qrOriginal;
  qrNormalizadoEl.textContent = docId;

  console.log("QR leído:", qrOriginal);
  console.log("ID usado:", docId);

  if (!docId) {
    mostrarConfirmacion("QR inválido ❌", "error");
    bloqueado = false;
    return;
  }

  try {

    const ref = db.collection("personas").doc(docId);
    const snap = await ref.get();

    if (!snap.exists) {
      mostrarConfirmacion("Persona no encontrada ❌", "error");
      bloqueado = false;
      return;
    }

    const data = snap.data();

    if (!data.asistencia) {

      await ref.update({
        asistencia: true,
        fechaAsistencia: firebase.firestore.FieldValue.serverTimestamp()
      });

      mostrarConfirmacion("Asistencia registrada ✅");

    } else {

      mostrarConfirmacion("Ya estaba registrado 🟡");

    }

    ultimoUsuarioEl.textContent = `👤 ${data.nombre}`;
    navigator.vibrate?.(100);

  } catch (err) {
    console.error(err);
    mostrarConfirmacion("Error en Firestore ❌", "error");
  }

  setTimeout(() => bloqueado = false, 1500);
}

/* Escaneo */
function tick() {

  if (!scanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code) {
      procesarQR(code.data);
    }
  }

  requestAnimationFrame(tick);
}

/* Iniciar cámara */
function iniciarEscaner() {

  if (scanning) return;
  scanning = true;

  readerEl.innerHTML = "";

  video = document.createElement("video");
  video.setAttribute("playsinline", true);
  readerEl.appendChild(video);

  canvas = document.createElement("canvas");
  ctx = canvas.getContext("2d");

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } }
  })
  .then(stream => {
    video.srcObject = stream;
    video.play();
    requestAnimationFrame(tick);
  })
  .catch(err => {
    console.error(err);
    mostrarConfirmacion("No se pudo acceder a la cámara ❌", "error");
  });
}

window.onload = iniciarEscaner;

</script>

</body>
</html>
